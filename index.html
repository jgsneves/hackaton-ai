<script>
(function () {
  &quot;use strict&quot;;

  /* -------------------- Mocked conversation script -------------------- */
  // Each user send advances to the next bot reply.
  const TIME = &quot;10:46&quot;;

  const botGreeting = {
    type: &quot;bot&quot;,
    html:
      &quot;Olá estou aqui para te ajudar a entender melhor suas finanças. &quot; +
      &quot;Posso te mostrar como está sua conta, seus gastos no cartão e os saldos que &quot; +
      &quot;você trouxe de outras instituições pelo Open Finance, tudo em um só lugar. &quot; +
      &quot;Por onde quer começar?&quot;
  };

  const billsCard = {
    type: &quot;bot&quot;,
    html:
      '<span class=&quot;line&quot;>Com base nas suas transações recentes você tem ' +
      '<b>R$ 8.400,00</b> em contas a pagar. aqui está o resumo:</span>' +
      '<div class=&quot;group&quot;><div class=&quot;ghead&quot;>🏭 Fornecedores</div>' +
        '<div class=&quot;gitem&quot;>Fornecedor A: R$ 3.200,00</div>' +
        '<div class=&quot;gitem&quot;>Fornecedor B: R$ 1.800,00</div></div>' +
      '<div class=&quot;group&quot;><div class=&quot;ghead&quot;>👤 Salários</div>' +
        '<div class=&quot;gitem&quot;>Salário João: R$ 1.500,00</div>' +
        '<div class=&quot;gitem&quot;>Salário Maria: R$ 900,00</div></div>' +
      '<div class=&quot;group&quot;><div class=&quot;ghead&quot;>⛽ Combustível</div>' +
        '<div class=&quot;gitem&quot;>Posto X: R$ 600,00</div>' +
        '<div class=&quot;gitem&quot;>Abastecimento frota: R$ 400,00</div></div>' +
      '<div class=&quot;total&quot;>Total da semana: R$ 8.400,00</div>' +
      '<div class=&quot;ask&quot;>Quer pagar alguma dessas contas agora?</div>'
  };

  const pixCard = {
    type: &quot;bot&quot;,
    pix: true,
    html:
      '<span class=&quot;line&quot;><b>Confira os dados da transferência Pix:</b></span>' +
      '<div class=&quot;group&quot;>' +
        '<div class=&quot;datarow&quot;><span class=&quot;ic&quot;>💰</span><span><span class=&quot;k&quot;>Valor:</span> R$1.500,00</span></div>' +
        '<div class=&quot;datarow&quot;><span class=&quot;ic&quot;>👤</span><span><span class=&quot;k&quot;>Para:</span> João Santos Neves</span></div>' +
        '<div class=&quot;datarow&quot;><span class=&quot;ic&quot;>📄</span><span><span class=&quot;k&quot;>Documento:</span> ***345.***-**</span></div>' +
        '<div class=&quot;datarow&quot;><span class=&quot;ic&quot;>🏦</span><span><span class=&quot;k&quot;>Instituição:</span> Banco do Brasil</span></div>' +
        '<div class=&quot;datarow&quot;><span class=&quot;ic&quot;>🔑</span><span><span class=&quot;k&quot;>Chave:</span> (48) 99219-2929</span></div>' +
      '</div>' +
      '<div class=&quot;ask&quot;><b>Confirma os dados?</b></div>' +
      '<div class=&quot;cardbtns&quot;>' +
        '<button class=&quot;cardbtn&quot; data-act=&quot;confirm&quot;>Confirmar dados</button>' +
        '<button class=&quot;cardbtn&quot; data-act=&quot;alter&quot;>Preciso alterar os dados</button>' +
      '</div>'
  };

  const alterReply = {
    type: &quot;bot&quot;,
    html:
      &quot;Sem problemas! Me diga o que você gostaria de alterar nos dados da &quot; +
      &quot;transferência (valor, chave ou destinatário) que eu atualizo para você.&quot;
  };

  const successCard = {
    type: &quot;bot&quot;,
    html:
      '<span class=&quot;line&quot;>✅ <b>Pix de R$1.500,00 enviado para João Santos Neves!</b></span>' +
      '<div class=&quot;group&quot;>Em 12/02/2026, às 10:46, com a segurança do app Stone. ' +
      'Você também pode acessar o comprovante no menu Extrato no app.</div>' +
      '<div class=&quot;cardbtns&quot;>' +
        '<button class=&quot;cardbtn&quot;>Ver comprovante</button>' +
        '<button class=&quot;cardbtn icon&quot;>🔗 Compartilhar comprovante</button>' +
      '</div>' +
      '<div class=&quot;feedback&quot;><span>Esta resposta te ajudou?</span>' +
        '<button aria-label=&quot;Sim&quot;>👍</button><button aria-label=&quot;Não&quot;>👎</button></div>'
  };

  const fallback = {
    type: &quot;bot&quot;,
    html:
      &quot;Posso te ajudar com mais alguma coisa? Pergunte sobre saldos, gastos no &quot; +
      &quot;cartão ou contas a pagar.&quot;
  };

  // Ordered bot replies triggered by each successive user message.
  const replyQueue = [billsCard, pixCard];

  /* -------------------- DOM refs -------------------- */
  const chatBody = document.getElementById(&quot;chatBody&quot;);
  const chatForm = document.getElementById(&quot;chatForm&quot;);
  const chatInput = document.getElementById(&quot;chatInput&quot;);
  const whatsAppView = document.getElementById(&quot;whatsAppView&quot;);
  const financesView = document.getElementById(&quot;financesView&quot;);
  const chatView = document.getElementById(&quot;chatView&quot;);
  const pinView = document.getElementById(&quot;pinView&quot;);

  /* -------------------- View switching -------------------- */
  function showView(el) {
    [whatsAppView, financesView, chatView, pinView].forEach(function (v) {
      v.classList.add(&quot;hidden&quot;);
    });
    el.classList.remove(&quot;hidden&quot;);
  }

  // Forward CTAs (pass-through flow): notification → dashboard → chat
  document.getElementById(&quot;goFinances&quot;).addEventListener(&quot;click&quot;, function () {
    showView(financesView);
  });
  document.getElementById(&quot;goChat&quot;).addEventListener(&quot;click&quot;, function () {
    showView(chatView);
  });

  let step = 0;          // index into replyQueue
  let busy = false;      // prevent sends while bot is &quot;typing&quot;

  /* -------------------- Rendering helpers -------------------- */
  function scrollDown() {
    chatBody.scrollTop = chatBody.scrollHeight;
  }

  function addUser(text) {
    const row = document.createElement(&quot;div&quot;);
    row.className = &quot;row user&quot;;
    row.innerHTML =
      '<div class=&quot;bubble user&quot;>' +
        '<div class=&quot;meta&quot;>Felipe <span class=&quot;t&quot;>' + TIME + '</span></div>' +
        '<div class=&quot;content&quot;></div>' +
      '</div>';
    row.querySelector(&quot;.content&quot;).textContent = text;
    chatBody.appendChild(row);
    scrollDown();
  }

  function addBot(msg) {
    const row = document.createElement(&quot;div&quot;);
    row.className = &quot;row bot&quot;;
    row.innerHTML =
      '<div class=&quot;bubble bot&quot;>' +
        '<div class=&quot;meta&quot;><span class=&quot;spark&quot;>✨</span> Consultor Minhas Finanças ' +
        '<span class=&quot;t&quot;>' + TIME + '</span></div>' +
        '<div class=&quot;content&quot;>' + msg.html + '</div>' +
      '</div>';
    chatBody.appendChild(row);
    bindCardButtons(row);
    scrollDown();
  }

  function showTyping() {
    const row = document.createElement(&quot;div&quot;);
    row.className = &quot;row bot typing-row&quot;;
    row.innerHTML = '<div class=&quot;typing&quot;><span></span><span></span><span></span></div>';
    chatBody.appendChild(row);
    scrollDown();
    return row;
  }

  function botReply(msg, delay) {
    busy = true;
    const t = showTyping();
    setTimeout(function () {
      t.remove();
      addBot(msg);
      busy = false;
    }, delay || 2000);
  }

  /* -------------------- Card button actions -------------------- */
  function bindCardButtons(scope) {
    const buttons = scope.querySelectorAll(&quot;[data-act]&quot;);
    buttons.forEach(function (btn) {
      btn.addEventListener(&quot;click&quot;, function () {
        const act = btn.getAttribute(&quot;data-act&quot;);
        if (act === &quot;confirm&quot;) {
          openPin();
        } else if (act === &quot;alter&quot;) {
          // disable the card buttons after choosing
          btn.closest(&quot;.cardbtns&quot;).querySelectorAll(&quot;button&quot;).forEach(function (b) {
            b.disabled = true; b.style.opacity = &quot;.55&quot;;
          });
          botReply(alterReply, 2000);
        }
      });
    });
  }

  /* -------------------- Chat send flow -------------------- */
  chatForm.addEventListener(&quot;submit&quot;, function (e) {
    e.preventDefault();
    const text = chatInput.value.trim();
    if (!text || busy) return;
    addUser(text);
    chatInput.value = &quot;&quot;;

    if (step < replyQueue.length) {
      const msg = replyQueue[step];
      step++;
      botReply(msg, 2000);
    } else {
      botReply(fallback, 2000);
    }
  });

  /* -------------------- PIN flow -------------------- */
  const boxes = Array.prototype.slice.call(document.querySelectorAll(&quot;.pin-box&quot;));
  const continuar = document.getElementById(&quot;continuar&quot;);
  const keypad = document.getElementById(&quot;keypad&quot;);
  let pin = &quot;&quot;;

  function openPin() {
    pin = &quot;&quot;;
    renderPin();
    showView(pinView);
  }

  function closePin() {
    showView(chatView);
  }

  function renderPin() {
    boxes.forEach(function (b, i) {
      b.classList.toggle(&quot;filled&quot;, i < pin.length);
      b.classList.toggle(&quot;active&quot;, i === pin.length &amp;&amp; pin.length < 6);
    });
    const full = pin.length === 6;
    continuar.classList.toggle(&quot;enabled&quot;, full);
    continuar.disabled = !full;
  }

  function pushDigit(d) {
    if (pin.length >= 6) return;
    pin += d;
    renderPin();
  }
  function popDigit() {
    pin = pin.slice(0, -1);
    renderPin();
  }

  keypad.addEventListener(&quot;click&quot;, function (e) {
    const key = e.target.closest(&quot;[data-k]&quot;);
    if (!key) return;
    const k = key.getAttribute(&quot;data-k&quot;);
    if (k === &quot;del&quot;) popDigit();
    else pushDigit(k);
  });

  // physical keyboard support while on the PIN screen
  document.addEventListener(&quot;keydown&quot;, function (e) {
    if (pinView.classList.contains(&quot;hidden&quot;)) return;
    if (e.key >= &quot;0&quot; &amp;&amp; e.key <= &quot;9&quot;) pushDigit(e.key);
    else if (e.key === &quot;Backspace&quot;) popDigit();
    else if (e.key === &quot;Enter&quot; &amp;&amp; pin.length === 6) submitPin();
  });

  document.getElementById(&quot;pinBack&quot;).addEventListener(&quot;click&quot;, closePin);

  continuar.addEventListener(&quot;click&quot;, submitPin);

  function submitPin() {
    if (pin.length !== 6) return;
    continuar.classList.add(&quot;loading&quot;);
    setTimeout(function () {
      continuar.classList.remove(&quot;loading&quot;);
      closePin();
      addUser(&quot;Transferência confirmada&quot;);
      botReply(successCard, 2000);
    }, 1100);
  }

  /* -------------------- Boot -------------------- */
  // Flow starts on the WhatsApp notification screen.
  // Greeting is pre-rendered so it's ready when the chat view appears.
  showView(whatsAppView);
  setTimeout(function () { addBot(botGreeting); }, 450);
  renderPin();
})();
</script>

<script>
(function () {
  &quot;use strict&quot;;

  /* -------------------- DOM refs -------------------- */
  const whatsAppView = document.getElementById(&quot;whatsAppView&quot;);
  const boletoView = document.getElementById(&quot;boletoView&quot;);
  const pinView = document.getElementById(&quot;pinView&quot;);
  const successView = document.getElementById(&quot;successView&quot;);

  /* -------------------- View switching -------------------- */
  function showView(el) {
    [whatsAppView, boletoView, pinView, successView].forEach(function (v) {
      v.classList.add(&quot;hidden&quot;);
    });
    el.classList.remove(&quot;hidden&quot;);
  }

  // Forward CTAs (pass-through flow): notification → boleto → pin → success
  document.getElementById(&quot;goBoleto&quot;).addEventListener(&quot;click&quot;, function () {
    showView(boletoView);
  });
  document.getElementById(&quot;boletoBack&quot;).addEventListener(&quot;click&quot;, function () {
    showView(whatsAppView);
  });
  document.getElementById(&quot;successClose&quot;).addEventListener(&quot;click&quot;, function () {
    resetAll();
    showView(whatsAppView);
  });
  document.getElementById(&quot;payAgain&quot;).addEventListener(&quot;click&quot;, function () {
    resetAll();
    showView(whatsAppView);
  });

  /* -------------------- Boleto accordions -------------------- */
  document.querySelectorAll(&quot;.bol-acc-head&quot;).forEach(function (head) {
    head.addEventListener(&quot;click&quot;, function () {
      head.closest(&quot;.bol-acc&quot;).classList.toggle(&quot;collapsed&quot;);
    });
  });

  /* -------------------- Confirm payment → PIN -------------------- */
  const confirmPay = document.getElementById(&quot;confirmPay&quot;);
  confirmPay.addEventListener(&quot;click&quot;, function () {
    confirmPay.classList.add(&quot;loading&quot;);
    setTimeout(function () {
      confirmPay.classList.remove(&quot;loading&quot;);
      openPin();
    }, 900);
  });

  /* -------------------- PIN flow -------------------- */
  const boxes = Array.prototype.slice.call(document.querySelectorAll(&quot;.pin-box&quot;));
  const continuar = document.getElementById(&quot;continuar&quot;);
  const keypad = document.getElementById(&quot;keypad&quot;);
  let pin = &quot;&quot;;

  function openPin() {
    pin = &quot;&quot;;
    renderPin();
    showView(pinView);
  }

  function renderPin() {
    boxes.forEach(function (b, i) {
      b.classList.toggle(&quot;filled&quot;, i < pin.length);
      b.classList.toggle(&quot;active&quot;, i === pin.length &amp;&amp; pin.length < 6);
    });
    const full = pin.length === 6;
    continuar.classList.toggle(&quot;enabled&quot;, full);
    continuar.disabled = !full;
  }

  function pushDigit(d) {
    if (pin.length >= 6) return;
    pin += d;
    renderPin();
  }
  function popDigit() {
    pin = pin.slice(0, -1);
    renderPin();
  }

  keypad.addEventListener(&quot;click&quot;, function (e) {
    const key = e.target.closest(&quot;[data-k]&quot;);
    if (!key) return;
    const k = key.getAttribute(&quot;data-k&quot;);
    if (k === &quot;del&quot;) popDigit();
    else pushDigit(k);
  });

  // physical keyboard support while on the PIN screen
  document.addEventListener(&quot;keydown&quot;, function (e) {
    if (pinView.classList.contains(&quot;hidden&quot;)) return;
    if (e.key >= &quot;0&quot; &amp;&amp; e.key <= &quot;9&quot;) pushDigit(e.key);
    else if (e.key === &quot;Backspace&quot;) popDigit();
    else if (e.key === &quot;Enter&quot; &amp;&amp; pin.length === 6) submitPin();
  });

  document.getElementById(&quot;pinBack&quot;).addEventListener(&quot;click&quot;, function () {
    showView(boletoView);
  });

  continuar.addEventListener(&quot;click&quot;, submitPin);

  function submitPin() {
    if (pin.length !== 6) return;
    continuar.classList.add(&quot;loading&quot;);
    setTimeout(function () {
      continuar.classList.remove(&quot;loading&quot;);
      showView(successView);
    }, 1100);
  }

  /* -------------------- Reset -------------------- */
  function resetAll() {
    pin = &quot;&quot;;
    renderPin();
    // re-expand accordions to their default (open) state
    document.querySelectorAll(&quot;.bol-acc&quot;).forEach(function (a) {
      a.classList.remove(&quot;collapsed&quot;);
    });
  }

  /* -------------------- Boot -------------------- */
  // Flow starts on the WhatsApp notification screen.
  showView(whatsAppView);
  renderPin();
})();
</script>

<script>
(function () {
  &quot;use strict&quot;;

  /* -------------------- DOM refs -------------------- */
  const whatsAppView = document.getElementById(&quot;whatsAppView&quot;);
  const amountView = document.getElementById(&quot;amountView&quot;);
  const institutionView = document.getElementById(&quot;institutionView&quot;);
  const depositView = document.getElementById(&quot;depositView&quot;);
  const redirectView = document.getElementById(&quot;redirectView&quot;);
  const faceIdView = document.getElementById(&quot;faceIdView&quot;);
  const authorizeView = document.getElementById(&quot;authorizeView&quot;);
  const redirectingView = document.getElementById(&quot;redirectingView&quot;);
  const browserView = document.getElementById(&quot;browserView&quot;);
  const finalizingView = document.getElementById(&quot;finalizingView&quot;);
  const depositDoneView = document.getElementById(&quot;depositDoneView&quot;);
  const boletoView = document.getElementById(&quot;boletoView&quot;);
  const pinView = document.getElementById(&quot;pinView&quot;);
  const successView = document.getElementById(&quot;successView&quot;);
  const allViews = [whatsAppView, amountView, institutionView, depositView, redirectView,
    faceIdView, authorizeView, redirectingView, browserView, finalizingView,
    depositDoneView, boletoView, pinView, successView];

  function showView(el) {
    allViews.forEach(function (v) { v.classList.add(&quot;hidden&quot;); });
    el.classList.remove(&quot;hidden&quot;);
  }

  /* -------------------- Shared state -------------------- */
  const STONE_BASE = 300000; // R$ 3.000,00 starting Stone balance, in cents
  let cents = 0;
  let institution = &quot;Nubank&quot;;

  function formatBRL(c) {
    var s = (c / 100).toFixed(2).split(&quot;.&quot;);
    var intp = s[0].replace(/\B(?=(\d{3})+(?!\d))/g, &quot;.&quot;);
    return intp + &quot;,&quot; + s[1];
  }

  /* -------------------- WhatsApp → Amount -------------------- */
  document.getElementById(&quot;goAmount&quot;).addEventListener(&quot;click&quot;, function () { showView(amountView); });
  document.getElementById(&quot;amountBack&quot;).addEventListener(&quot;click&quot;, function () { showView(whatsAppView); });

  /* -------------------- Amount entry -------------------- */
  const amtVal = document.getElementById(&quot;amtVal&quot;);
  const amtContinue = document.getElementById(&quot;amtContinue&quot;);
  const amtKeypad = document.getElementById(&quot;amtKeypad&quot;);

  function renderAmount() {
    amtVal.textContent = formatBRL(cents);
    amtVal.classList.toggle(&quot;empty&quot;, cents === 0);
    const ok = cents > 0;
    amtContinue.classList.toggle(&quot;enabled&quot;, ok);
    amtContinue.disabled = !ok;
  }
  amtKeypad.addEventListener(&quot;click&quot;, function (e) {
    const key = e.target.closest(&quot;[data-k]&quot;);
    if (!key) return;
    const k = key.getAttribute(&quot;data-k&quot;);
    if (k === &quot;del&quot;) cents = Math.floor(cents / 10);
    else if (k === &quot;noop&quot;) return;
    else if (cents < 1e11) cents = cents * 10 + parseInt(k, 10);
    renderAmount();
  });
  document.addEventListener(&quot;keydown&quot;, function (e) {
    if (amountView.classList.contains(&quot;hidden&quot;)) return;
    if (e.key >= &quot;0&quot; &amp;&amp; e.key <= &quot;9&quot;) { if (cents < 1e11) cents = cents * 10 + parseInt(e.key, 10); renderAmount(); }
    else if (e.key === &quot;Backspace&quot;) { cents = Math.floor(cents / 10); renderAmount(); }
    else if (e.key === &quot;Enter&quot; &amp;&amp; cents > 0) showView(institutionView);
  });
  amtContinue.addEventListener(&quot;click&quot;, function () { if (cents > 0) showView(institutionView); });

  /* -------------------- Institution pick → Deposit confirm -------------------- */
  document.getElementById(&quot;instBack&quot;).addEventListener(&quot;click&quot;, function () { showView(amountView); });
  document.querySelectorAll(&quot;.inst-row&quot;).forEach(function (row) {
    row.addEventListener(&quot;click&quot;, function () {
      institution = row.getAttribute(&quot;data-inst&quot;);
      hydrateDeposit();
      showView(depositView);
    });
  });

  /* -------------------- Deposit confirm -------------------- */
  const depAmount = document.getElementById(&quot;depAmount&quot;);
  const depOrigin = document.getElementById(&quot;depOrigin&quot;);
  const depNote = document.getElementById(&quot;depNote&quot;);
  const depContinue = document.getElementById(&quot;depContinue&quot;);

  function shortInst() { return institution.split(&quot; Instituição&quot;)[0]; }

  function hydrateDeposit() {
    depAmount.textContent = &quot;R$ &quot; + formatBRL(cents);
    depOrigin.innerHTML = shortInst() + ' <span class=&quot;ch&quot;>›</span>';
    depNote.textContent = &quot;Ao continuar, vamos te redirecionar de forma segura para a instituição &quot; + shortInst() + &quot;.&quot;;
  }

  document.getElementById(&quot;depBack&quot;).addEventListener(&quot;click&quot;, function () { showView(institutionView); });

  depContinue.addEventListener(&quot;click&quot;, function () {
    depContinue.classList.add(&quot;loading&quot;);
    setTimeout(function () {
      depContinue.classList.remove(&quot;loading&quot;);
      document.getElementById(&quot;redSub&quot;).textContent =
        &quot;Você está sendo redirecionado para a instituição &quot; + shortInst() + &quot; de forma segura.&quot;;
      showView(redirectView);
      // part 1 → part 2 handoff: land in the other institution's app
      setTimeout(function () { hydrateAuthorize(); showView(faceIdView); }, 1900);
    }, 1000);
  });

  /* -------------------- Face ID → Authorize -------------------- */
  document.getElementById(&quot;faceTap&quot;).addEventListener(&quot;click&quot;, function () { showView(authorizeView); });

  function hydrateAuthorize() {
    document.getElementById(&quot;authAmount&quot;).textContent = &quot;R$ &quot; + formatBRL(cents);
  }

  /* -------------------- Authorize → Redirecting -------------------- */
  const authAuthorize = document.getElementById(&quot;authAuthorize&quot;);
  authAuthorize.addEventListener(&quot;click&quot;, function () {
    authAuthorize.classList.add(&quot;loading&quot;);
    authAuthorize.textContent = &quot;Autorizando...&quot;;
    setTimeout(function () {
      authAuthorize.classList.remove(&quot;loading&quot;);
      authAuthorize.textContent = &quot;Autorizar&quot;;
      showView(redirectingView);
      setTimeout(function () { showView(browserView); }, 1700);
    }, 900);
  });
  function cancelAuth() { showView(faceIdView); }
  document.getElementById(&quot;authCancel&quot;).addEventListener(&quot;click&quot;, cancelAuth);
  document.getElementById(&quot;authCancelTop&quot;).addEventListener(&quot;click&quot;, cancelAuth);

  /* -------------------- Browser dialog -------------------- */
  document.getElementById(&quot;brOpen&quot;).addEventListener(&quot;click&quot;, function () {
    showView(finalizingView);
    setTimeout(function () { hydrateDepositDone(); showView(depositDoneView); }, 1700);
  });
  document.getElementById(&quot;brCancel&quot;).addEventListener(&quot;click&quot;, function () { showView(redirectingView); });

  function hydrateDepositDone() {
    document.getElementById(&quot;ddAmount&quot;).textContent = &quot;R$ &quot; + formatBRL(cents);
    document.getElementById(&quot;ddInst&quot;).textContent = shortInst();
  }

  /* -------------------- Deposit done → Boleto -------------------- */
  document.getElementById(&quot;goBoleto&quot;).addEventListener(&quot;click&quot;, function () {
    document.getElementById(&quot;bolSaldo&quot;).textContent = &quot;R$ &quot; + formatBRL(STONE_BASE + cents);
    showView(boletoView);
  });
  document.getElementById(&quot;boletoBack&quot;).addEventListener(&quot;click&quot;, function () { showView(depositDoneView); });

  /* -------------------- Boleto accordions -------------------- */
  document.querySelectorAll(&quot;.bol-acc-head&quot;).forEach(function (head) {
    head.addEventListener(&quot;click&quot;, function () { head.closest(&quot;.bol-acc&quot;).classList.toggle(&quot;collapsed&quot;); });
  });

  /* -------------------- Confirm payment → PIN -------------------- */
  const confirmPay = document.getElementById(&quot;confirmPay&quot;);
  confirmPay.addEventListener(&quot;click&quot;, function () {
    confirmPay.classList.add(&quot;loading&quot;);
    setTimeout(function () { confirmPay.classList.remove(&quot;loading&quot;); openPin(); }, 900);
  });

  /* -------------------- PIN flow -------------------- */
  const boxes = Array.prototype.slice.call(document.querySelectorAll(&quot;.pin-box&quot;));
  const continuar = document.getElementById(&quot;continuar&quot;);
  const keypad = document.getElementById(&quot;keypad&quot;);
  let pin = &quot;&quot;;

  function openPin() { pin = &quot;&quot;; renderPin(); showView(pinView); }
  function renderPin() {
    boxes.forEach(function (b, i) {
      b.classList.toggle(&quot;filled&quot;, i < pin.length);
      b.classList.toggle(&quot;active&quot;, i === pin.length &amp;&amp; pin.length < 6);
    });
    const full = pin.length === 6;
    continuar.classList.toggle(&quot;enabled&quot;, full);
    continuar.disabled = !full;
  }
  function pushDigit(d) { if (pin.length >= 6) return; pin += d; renderPin(); }
  function popDigit() { pin = pin.slice(0, -1); renderPin(); }

  keypad.addEventListener(&quot;click&quot;, function (e) {
    const key = e.target.closest(&quot;[data-k]&quot;);
    if (!key) return;
    const k = key.getAttribute(&quot;data-k&quot;);
    if (k === &quot;del&quot;) popDigit(); else pushDigit(k);
  });
  document.addEventListener(&quot;keydown&quot;, function (e) {
    if (pinView.classList.contains(&quot;hidden&quot;)) return;
    if (e.key >= &quot;0&quot; &amp;&amp; e.key <= &quot;9&quot;) pushDigit(e.key);
    else if (e.key === &quot;Backspace&quot;) popDigit();
    else if (e.key === &quot;Enter&quot; &amp;&amp; pin.length === 6) submitPin();
  });
  document.getElementById(&quot;pinBack&quot;).addEventListener(&quot;click&quot;, function () { showView(boletoView); });
  continuar.addEventListener(&quot;click&quot;, submitPin);
  function submitPin() {
    if (pin.length !== 6) return;
    continuar.classList.add(&quot;loading&quot;);
    setTimeout(function () { continuar.classList.remove(&quot;loading&quot;); showView(successView); }, 1100);
  }

  /* -------------------- Success → restart -------------------- */
  function restart() {
    cents = 0; institution = &quot;Nubank&quot;; pin = &quot;&quot;;
    renderAmount(); renderPin();
    document.querySelectorAll(&quot;.bol-acc&quot;).forEach(function (a) { a.classList.remove(&quot;collapsed&quot;); });
    showView(whatsAppView);
  }
  document.getElementById(&quot;successClose&quot;).addEventListener(&quot;click&quot;, restart);
  document.getElementById(&quot;restart&quot;).addEventListener(&quot;click&quot;, restart);

  /* -------------------- Boot -------------------- */
  showView(whatsAppView);
  renderAmount();
  renderPin();
})();
</script>

      var frames = document.querySelectorAll(".frame");
      document.querySelector(".tabbar").addEventListener("click", function (e) {
        var btn = e.target.closest(".tab");
        if (!btn) return;
        var id = btn.getAttribute("data-target");
        tabs.forEach(function (t) { t.classList.toggle("active", t === btn); });
        frames.forEach(function (f) { f.classList.toggle("hidden", f.id !== id); });
      });
    })();
  </script>
</body>
</html>
